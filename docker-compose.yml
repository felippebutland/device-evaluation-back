version: '3.8'

services:
  app:
    build: .
    container_name: device-evaluation-management-app
    restart: unless-stopped
    ports:
      - '3737:3737'
    environment:
      - MONGODB_URI=mongodb://admin:password123@mongodb:27018/device-evaluation-management?authSource=admin
    depends_on:
      - mongodb
    env_file:
      - .env
    networks:
      - device-evaluation-management-network

  mongodb:
    image: mongo:7.0
    container_name: device-evaluation-management-mongodb
    restart: unless-stopped
    command: mongod --port 27018
    ports:
      - "27018:27018"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password123}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-device-evaluation-management}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - device-evaluation-management-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

# Networks
networks:
  device-evaluation-management-network:
    driver: bridge